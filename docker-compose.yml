version: "3.8"

services:
  # ── FastAPI Backend ───────────────────────────────────────────────────────
  api:
    build: .
    container_name: airlock-api
    ports:
      - "8000:8000"
    environment:
      - AIRLOCK_AI_BACKEND=ollama
      - AIRLOCK_OLLAMA_URL=http://ollama:11434/api/generate
      - AIRLOCK_OLLAMA_MODEL=llama3
    volumes:
      - ./data:/app/data:ro
    depends_on:
      - ollama
    restart: unless-stopped
    networks:
      - airlock

  # ── Streamlit UI ──────────────────────────────────────────────────────────
  ui:
    build: .
    container_name: airlock-ui
    ports:
      - "8501:8501"
    environment:
      - AIRLOCK_API_URL=http://api:8000
    command: ["streamlit", "run", "ui.py", "--server.port=8501", "--server.headless=true"]
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - airlock

  # ── Ollama (Local LLM) ───────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: airlock-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    networks:
      - airlock

volumes:
  ollama_data:

networks:
  airlock:
    driver: bridge
